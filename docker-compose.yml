services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"
    volumes:
      # Volumen persistente para datos de Hermes (config, memoria, skills, sesiones)
      - hermes-data:/opt/data
    environment:
      # Variables de entorno inyectadas por Dokploy
      # LLM Providers
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - NOVITA_API_KEY=${NOVITA_API_KEY:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - GLM_API_KEY=${GLM_API_KEY:-}

      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - TELEGRAM_HOME_CHANNEL=${TELEGRAM_HOME_CHANNEL:-}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL:-}
      - TELEGRAM_WEBHOOK_PORT=${TELEGRAM_WEBHOOK_PORT:-8443}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}

      # Terminal
      - TERMINAL_MODAL_IMAGE=${TERMINAL_MODAL_IMAGE:-nikolaik/python-nodejs:python3.11-nodejs20}
      - TERMINAL_TIMEOUT=${TERMINAL_TIMEOUT:-180}
      - TERMINAL_LIFETIME_SECONDS=${TERMINAL_LIFETIME_SECONDS:-300}

      # Browser
      - BROWSERBASE_API_KEY=${BROWSERBASE_API_KEY:-}
      - BROWSERBASE_PROXIES=${BROWSERBASE_PROXIES:-true}
      - BROWSERBASE_ADVANCED_STEALTH=${BROWSERBASE_ADVANCED_STEALTH:-false}
      - BROWSER_SESSION_TIMEOUT=${BROWSER_SESSION_TIMEOUT:-300}
      - BROWSER_INACTIVITY_TIMEOUT=${BROWSER_INACTIVITY_TIMEOUT:-120}

      # Opcional: descomenta si necesitas saltar migraciones de config
      # - HERMES_SKIP_CONFIG_MIGRATION=1
    networks:
      - hermes-net
    # Labels para Traefik en Dokploy (se configuran automáticamente)
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.hermes.loadbalancer.server.port=8642"
    # Descomenta si necesitas acceso a GPUs locales
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  hermes-data:
    driver: local

networks:
  hermes-net:
    driver: bridge
